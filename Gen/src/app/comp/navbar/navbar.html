<mat-toolbar class="app-header">
  <!-- Logo -->
  <div class="logo-container">
    <img src="assets/img.webp" alt="Logo" class="logo-img" />
    <span class="logo-text">Issue Dashboard</span>
  </div>

  <!-- Navigation links -->
  <span class="spacer"></span>
  <button mat-button routerLink="/issue">Issues</button>
  <button  mat-button routerLink="/create">My Assignments</button>
  <button mat-button routerLink="/profile">Profile</button>

  <!-- Logout button -->
  <button mat-icon-button color="warn" (click)="logout()">
    <mat-icon>exit_to_app</mat-icon>
  </button>
</mat-toolbar>
