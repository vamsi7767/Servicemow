<div class="dashboard-container">

  <h2>Welcome, {{ user?.name || 'User' }} 👋</h2>

 <div class="dashboard-container">

  <h2>Dashboard 📊</h2>

  <div class="cards">

    <mat-card class="card">
      <h3>Total Issues</h3>
      <p>{{ total }}</p>
    </mat-card>

    <mat-card class="card">
      <h3>Open Issues</h3>
      <p>{{ open }}</p>
    </mat-card>

    <mat-card class="card">
      <h3>In Progress</h3>
      <p>{{ inProgress }}</p>
    </mat-card>

    <mat-card class="card">
      <h3>Completed</h3>
      <p>{{ completed }}</p>
    </mat-card>

  </div>

</div>

</div>
